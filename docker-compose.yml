services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lc
      POSTGRES_PASSWORD: lc
      POSTGRES_DB: lc
    ports:
      # Host port is non-default (and overridable) to avoid clashing with a
      # local Postgres or the prod tunnel. Container port stays 5432.
      - "${HOST_DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lc -d lc"]
      interval: 5s
      timeout: 3s
      retries: 12
